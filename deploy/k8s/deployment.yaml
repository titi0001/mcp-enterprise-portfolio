apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-mcp
  labels: {app: retail-mcp}
spec:
  replicas: 3
  selector:
    matchLabels: {app: retail-mcp}
  template:
    metadata:
      labels: {app: retail-mcp}
    spec:
      serviceAccountName: retail-mcp
      securityContext:
        runAsNonRoot: true
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: server
          image: ghcr.io/example/retail-mcp:1.0.0
          ports:
            - {name: http, containerPort: 8000}
          env:
            - {name: RETAIL_MCP_ENVIRONMENT, value: production}
            - {name: RETAIL_MCP_HOST, value: 0.0.0.0}
            - {name: RETAIL_MCP_DATA_BACKEND, value: postgres}
            - name: RETAIL_MCP_DATABASE_URL
              valueFrom: {secretKeyRef: {name: retail-mcp-secrets, key: database-url}}
            - name: RETAIL_MCP_REDIS_URL
              valueFrom: {secretKeyRef: {name: retail-mcp-secrets, key: redis-url}}
            - name: RETAIL_MCP_API_KEYS
              valueFrom: {secretKeyRef: {name: retail-mcp-secrets, key: api-keys}}
          readinessProbe:
            httpGet: {path: /health/ready, port: http}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /health/live, port: http}
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: "1", memory: 512Mi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
---
apiVersion: v1
kind: Service
metadata:
  name: retail-mcp
spec:
  selector: {app: retail-mcp}
  ports:
    - {name: http, port: 80, targetPort: http}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: retail-mcp
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: retail-mcp}
  minReplicas: 3
  maxReplicas: 20
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: {type: Utilization, averageUtilization: 65}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: retail-mcp
automountServiceAccountToken: false
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: retail-mcp
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 1m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
spec:
  tls:
    - hosts: [mcp.example.com]
      secretName: retail-mcp-tls
  rules:
    - host: mcp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: {name: retail-mcp, port: {name: http}}

